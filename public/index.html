<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRE // INTERACTIVE SECURITY OVERSEE MUX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Code', monospace; background-color: #060608; }
        .cyber-panel { background: rgba(11, 11, 15, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(155, 0, 255, 0.15); }
        .neon-glow:hover { box-shadow: 0 0 15px rgba(155, 0, 255, 0.4); border-color: rgba(155, 0, 255, 0.6); }
        .matrix-grid { background-image: linear-gradient(rgba(155, 0, 255, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(155, 0, 255, 0.01) 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="matrix-grid text-gray-300 min-h-screen p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center border-b border-purple-900/30 pb-6 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-widest flex items-center gap-3">
                <span class="w-3 h-3 bg-purple-600 animate-pulse rounded-full shadow-[0_0_10px_#9b00ff]"></span>
                SPECTRE // PROFILE MANAGEMENT INTERMEDIARY v2.8
            </h1>
        </div>
        <div id="timestamp-clock" class="text-white font-mono text-sm">00:00:00 PM</div>
    </header>

    <main class="max-w-7xl mx-auto space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="cyber-panel p-5 rounded border-l-4 border-l-purple-600">
                <span class="text-xs text-purple-400 font-bold block">TOTAL LICENSES ISSUED</span>
                <span id="m-total" class="text-4xl font-bold text-white mt-1 block">00</span>
            </div>
            <div class="cyber-panel p-5 rounded border-l-4 border-l-green-500">
                <span class="text-xs text-green-400 font-bold block">ACTIVE NET CHANNELS</span>
                <span id="m-active" class="text-4xl font-bold text-white mt-1 block">00</span>
            </div>
            <div class="cyber-panel p-5 rounded border-l-4 border-l-red-500">
                <span class="text-xs text-red-400 font-bold block">HARD BLACKLISTED IDS</span>
                <span id="m-black" class="text-4xl font-bold text-white mt-1 block">00</span>
            </div>
        </div>

        <div class="cyber-panel p-6 rounded">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="custom-key" placeholder="CUSTOM IDENTITY LABEL TAG" class="bg-black/60 border border-purple-900/50 rounded px-3 py-2 text-xs text-white uppercase outline-none focus:border-purple-500">
                <input type="number" id="key-hours" placeholder="HOURS ALLOCATION VALUE" class="bg-black/60 border border-purple-900/50 rounded px-3 py-2 text-xs text-white outline-none focus:border-purple-500">
                <button onclick="mintToken()" class="bg-purple-900/20 hover:bg-purple-600 border border-purple-500/40 text-xs font-bold py-2 rounded transition-all neon-glow text-white">MINT ACCESS CORE</button>
                <button onclick="purgeExpiredTokens()" class="bg-red-950/20 hover:bg-red-700 border border-red-500/30 text-xs font-bold py-2 rounded transition-all text-white">PURGE RECLAIM EXPIRED</button>
            </div>
            <div id="mint-out" class="hidden mt-4 p-3 bg-purple-950/40 border border-purple-500/30 text-xs text-purple-300 rounded font-mono"></div>
        </div>

        <div class="cyber-panel p-6 rounded">
            <div class="flex justify-between items-center mb-4 pb-4 border-b border-purple-900/30">
                <h3 class="text-xs font-bold text-white tracking-widest">[//] SECURE CONTROL MASTER LAYER INDEX</h3>
                <input type="text" id="search-filter" oninput="renderTable()" placeholder="LOOKUP ACCOUNT..." class="bg-black/60 border border-purple-900/50 rounded px-3 py-1.5 text-xs text-white uppercase outline-none font-mono">
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-purple-900/40 text-[10px] text-purple-400 uppercase tracking-wider font-bold">
                            <th class="pb-3">Identity Context</th>
                            <th class="pb-3">Licensing Vector</th>
                            <th class="pb-3">First Activated</th>
                            <th class="pb-3">Executor Run</th>
                            <th class="pb-3">Internal Admin Notes Space</th>
                            <th class="pb-3 text-right">Operations Directives</th>
                        </tr>
                    </thead>
                    <tbody id="key-table-body" class="text-xs font-mono divide-y divide-purple-950/10">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let cachedKeys = [];

        async function runMatrixSync() {
            try {
                const response = await fetch(window.location.origin + '/api/admin/metrics');
                if (!response.ok) return;
                const data = await response.json();
                cachedKeys = data.keysList || [];
                
                document.getElementById('m-total').innerText = String(data.totalKeys || 0).padStart(2, '0');
                document.getElementById('m-active').innerText = String(data.activeKeys || 0).padStart(2, '0');
                document.getElementById('m-black').innerText = String(data.blacklistedKeys || 0).padStart(2, '0');
                
                renderTable();
            } catch(e) { console.error("Database Connection Fault Layer:", e); }
        }

        function renderTable() {
            const filter = document.getElementById('search-filter').value.toUpperCase();
            const body = document.getElementById('key-table-body');
            body.innerHTML = '';

            cachedKeys.forEach(item => {
                if (filter && !item.key.toUpperCase().includes(filter) && !(item.assignedUser && item.assignedUser.toUpperCase().includes(filter))) return;

                const activatedDisplay = item.activatedAt ? new Date(item.activatedAt).toLocaleString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'}) : "—";
                const badge = item.isBlacklisted 
                    ? `<span class="text-red-500 font-bold border border-red-900/50 px-1.5 py-0.5 rounded text-[10px] bg-red-950/20">BLOCKED</span>`
                    : (!item.assignedUser ? `<span class="text-yellow-500 font-bold border border-yellow-900/40 px-1.5 py-0.5 rounded text-[10px] bg-yellow-950/10">UNUSED</span>` : `<span class="text-green-400 font-bold border border-green-900/40 px-1.5 py-0.5 rounded text-[10px] bg-green-950/10">BOUND</span>`);

                const action = !item.isBlacklisted
                    ? `<button onclick="terminateLicense('${item.key}')" class="text-[10px] text-red-400 hover:text-white border border-red-500/30 px-2 py-0.5 rounded">TERMINATE</button>`
                    : `<button onclick="unblacklistLicense('${item.key}')" class="text-[10px] text-purple-400 hover:text-white border border-purple-500/30 px-2 py-0.5 rounded">RESTORE</button>`;

                body.innerHTML += `
                    <tr class="hover:bg-purple-950/10 border-b border-purple-900/5">
                        <td class="py-3 flex items-center gap-3">
                            <img src="${item.avatarUrl}" class="w-8 h-8 rounded-full border border-purple-500/40 bg-black/40 shadow-sm" onerror="this.src='https://www.roblox.com/headshot-thumbnail/image?userId=1&width=150&height=150&format=png'">
                            <div>
                                <div class="text-white font-bold">${item.assignedUser || '—'}</div>
                                <div class="text-[10px] text-gray-500 font-mono">${item.assignedUserId || 'UNASSIGNED'}</div>
                            </div>
                        </td>
                        <td class="py-3 select-all text-purple-300 font-medium">${item.key}</td>
                        <td class="py-3 text-gray-400">${activatedDisplay}</td>
                        <td class="py-3 text-purple-400/80 font-semibold">${item.assignedExecutor || '—'}</td>
                        <td class="py-3">
                            ${item.assignedUserId ? `
                                <input type="text" value="${item.adminNotes || ''}" onchange="saveNotes('${item.assignedUserId}', this.value)" placeholder="Click to add note..." class="w-full max-w-[200px] bg-black/40 border border-purple-900/30 text-[11px] px-2 py-1 text-gray-300 rounded outline-none focus:border-purple-500 font-mono">
                            ` : '<span class="text-gray-600 text-[11px]">Bind key to edit notes</span>'}
                        </td>
                        <td class="py-3 text-right">
                            <div class="flex justify-end gap-2 items-center">
                                ${badge} ${action}
                            </div>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('timestamp-clock').innerText = new Date().toLocaleTimeString();
        }

        async function saveNotes(robloxUserId, notes) {
            await fetch(window.location.origin + '/api/admin/profile/notes', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ robloxUserId, notes })
            });
            runMatrixSync();
        }

        async function mintToken() {
            const customKey = document.getElementById('custom-key').value.trim();
            const durationHours = document.getElementById('key-hours').value.trim();
            const res = await (await fetch(window.location.origin + '/api/admin/keys/create', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ customKey: customKey || null, durationHours: durationHours || "24" })
            })).json();
            if(res.success) {
                document.getElementById('mint-out').innerHTML = `MINTED CODE VECTOR: <strong class="text-white select-all">${res.key.key}</strong>`;
                document.getElementById('mint-out').classList.remove('hidden');
                runMatrixSync();
            }
        }

        async function terminateLicense(key) {
            const reason = prompt("State operational blacklist cause context:");
            if (reason === null) return;
            await fetch(window.location.origin + '/api/admin/keys/blacklist', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ key, reason: reason || "Manual System Administrator Action Overrule" })
            });
            runMatrixSync();
        }

        async function unblacklistLicense(key) {
            if(!confirm("Restore license token access paths?")) return;
            await fetch(window.location.origin + '/api/admin/keys/restore', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ key })
            });
            runMatrixSync();
        }

        async function purgeExpiredTokens() {
            await fetch(window.location.origin + '/api/admin/keys/purge-expired', { method: "POST" });
            runMatrixSync();
        }

        setInterval(runMatrixSync, 6000);
        window.onload = runMatrixSync;
    </script>
</body>
</html>
