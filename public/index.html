<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRE // CORE CONTROL MATRIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Code', monospace; background-color: #060608; }
        .cyber-panel { background: rgba(11, 11, 15, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(155, 0, 255, 0.15); box-shadow: 0 0 25px rgba(0,0,0,0.5); }
        .neon-glow:hover { box-shadow: 0 0 15px rgba(155, 0, 255, 0.4); border-color: rgba(155, 0, 255, 0.6); }
        .neon-text { text-shadow: 0 0 8px rgba(155, 0, 255, 0.6); }
        .matrix-grid { background-image: linear-gradient(rgba(155, 0, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(155, 0, 255, 0.02) 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="matrix-grid text-gray-300 min-h-screen p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center border-b border-purple-900/30 pb-6 gap-4">
        <div>
            <h1 class="text-2xl md:text-3xl font-bold text-white tracking-widest neon-text flex items-center gap-3">
                <span class="inline-block w-3 h-3 bg-purple-600 animate-pulse rounded-full shadow-[0_0_10px_#9b00ff]"></span>
                SPECTRE // TELEMETRY HUB v2.0
            </h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="cyber-panel p-5 rounded-lg">
                <span class="text-xs text-purple-400 uppercase font-bold tracking-wider">Total Tokens</span>
                <span id="m-total" class="text-4xl font-bold text-white block mt-2">00</span>
            </div>
            <div class="cyber-panel p-5 rounded-lg">
                <span class="text-xs text-green-400 uppercase font-bold tracking-wider">Active Channels</span>
                <span id="m-active" class="text-4xl font-bold text-white block mt-2">00</span>
            </div>
            <div class="cyber-panel p-5 rounded-lg">
                <span class="text-xs text-red-400 uppercase font-bold tracking-wider">Blacklists</span>
                <span id="m-black" class="text-4xl font-bold text-white block mt-2">00</span>
            </div>

            <div class="cyber-panel p-6 rounded-lg sm:col-span-3">
                <h3 class="text-sm font-bold uppercase text-white mb-4 tracking-wider">[//] MINT TERMINAL</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="custom-key" placeholder="LEAVE BLANK FOR AUTO TOKEN" class="bg-black/50 border border-purple-900/50 rounded px-4 py-2.5 text-xs text-white uppercase">
                    <input type="number" id="key-hours" placeholder="LIFESPAN HOURS (Default: 24)" class="bg-black/50 border border-purple-900/50 rounded px-4 py-2.5 text-xs text-white">
                    <button onclick="mintToken()" class="bg-purple-900/30 hover:bg-purple-600 text-purple-300 hover:text-white border border-purple-500/40 font-bold text-xs uppercase rounded py-2.5 transition-all neon-glow">MINT KEY</button>
                </div>
                <div id="mint-out" class="hidden mt-4 p-3 bg-purple-950/20 border border-purple-500/30 text-xs text-purple-300 rounded"></div>
            </div>

            <div class="cyber-panel p-6 rounded-lg sm:col-span-3">
                <h3 class="text-sm font-bold uppercase text-white mb-4 tracking-wider">[//] MASTER SYSTEM INDEX</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-purple-900/40 text-[11px] text-purple-400 font-bold uppercase">
                                <th class="pb-3">Key</th>
                                <th class="pb-3">Holder</th>
                                <th class="pb-3">HWID</th>
                                <th class="pb-3 text-right">Directives</th>
                            </tr>
                        </thead>
                        <tbody id="key-table-body" class="text-xs divide-y divide-purple-950/20"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="cyber-panel p-6 rounded-lg h-full">
            <h3 class="text-sm font-bold uppercase text-white mb-4 tracking-wider">LIVE AUDIT LOG</h3>
            <div id="audit-logs" class="space-y-3 max-h-[550px] overflow-y-auto"></div>
        </div>
    </main>

    <script>
        async function runMatrixSync() {
            try {
                const response = await fetch(window.location.origin + '/api/admin/metrics');
                if (!response.ok) return;

                const data = await response.json();
                document.getElementById('m-total').innerText = String(data.totalKeys || 0).padStart(2, '0');
                document.getElementById('m-active').innerText = String(data.activeKeys || 0).padStart(2, '0');
                document.getElementById('m-black').innerText = String(data.blacklistedKeys || 0).padStart(2, '0');

                const tableBody = document.getElementById('key-table-body');
                tableBody.innerHTML = '';
                if (data.keysList) {
                    data.keysList.forEach(item => {
                        let badge = item.isBlacklisted ? '<span class="text-red-500">REVOKED</span>' : (!item.assignedUser ? '<span class="text-yellow-500">READY</span>' : '<span class="text-green-400">BOUND</span>');
                        tableBody.innerHTML += `
                            <tr>
                                <td class="py-3 text-white">${item.key}</td>
                                <td class="py-3 text-purple-300">${item.assignedUser || '—'}</td>
                                <td class="py-3 text-gray-400 text-[10px] max-w-[100px] truncate">${item.assignedHWID || '—'}</td>
                                <td class="py-3 text-right">${badge}</td>
                            </tr>
                        `;
                    });
                }
            } catch(e) { 
                console.error("Pipeline Sync Error:", e); 
            }
        }

        async function mintToken() {
            const customKey = document.getElementById('custom-key').value.trim();
            let durationHours = document.getElementById('key-hours').value.trim();
            
            const response = await fetch(window.location.origin + '/api/admin/keys/create', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    customKey: customKey !== "" ? customKey : null, 
                    durationHours: durationHours !== "" ? durationHours : "24" 
                })
            });
            
            const res = await response.json();
            if(res.success) {
                const alertB = document.getElementById('mint-out');
                alertB.innerHTML = `MINT SUCCESSFUL: <strong>${res.key.key}</strong>`;
                alertB.classList.remove('hidden');
                runMatrixSync();
            }
        }

        setInterval(runMatrixSync, 4000);
        window.onload = runMatrixSync;
    </script>
</body>
</html>
